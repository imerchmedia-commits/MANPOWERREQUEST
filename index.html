<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iMerch Media Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        .active-link { background-color: #1e3a8a; border-left: 4px solid #facc15; }
        .content-section { display: none; }
        .content-section.active { display: block; }
        /* Form specific styles */
        .mrf-container { max-width: 900px; margin: auto; border: 2px solid #000; padding: 20px; background: #fff; }
        input[type="text"], input[type="number"], input[type="date"], select { border-bottom: 1px solid #000; outline: none; padding: 2px; font-size: 12px; border-top:none; border-left:none; border-right:none; background: transparent; }
        canvas { border: 1px dashed #ccc; width: 100%; height: 80px; background: #fdfdfd; }
    </style>
</head>
<body class="bg-gray-100 flex h-screen overflow-hidden">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-slate-900 text-white flex flex-col shadow-xl">
        <div class="p-6 border-b border-slate-700 text-center">
            <img src="logo1.png" alt="Logo" class="h-12 mx-auto mb-2 object-contain">
            <h2 class="text-sm font-bold tracking-tighter uppercase">i-Merch Systems</h2>
        </div>
        
        <nav class="flex-1 mt-4">
            <a href="#" onclick="showSection('dashboard')" id="nav-dashboard" class="flex items-center px-6 py-4 hover:bg-slate-800 transition-all active-link">
                <span class="mr-3">📊</span> Dashboard
            </a>
            <a href="#" onclick="showSection('mrf')" id="nav-mrf" class="flex items-center px-6 py-4 hover:bg-slate-800 transition-all">
                <span class="mr-3">📄</span> Manpower Request
            </a>
        </nav>

        <div class="p-4 border-t border-slate-700 text-[10px] text-slate-400 text-center">
            Developed for iMerch Media Inc.
        </div>
    </aside>

    <!-- MAIN CONTENT AREA -->
    <main class="flex-1 overflow-y-auto p-8">
        
        <!-- SECTION: DASHBOARD (Pending Requests) -->
        <section id="section-dashboard" class="content-section active">
            <div class="mb-6">
                <h1 class="text-2xl font-bold text-gray-800">Pending Approvals</h1>
                <p class="text-sm text-gray-500">Listahan ng mga MRF na naghihintay ng pirma.</p>
            </div>
            
            <div class="bg-white rounded-lg shadow overflow-hidden border border-gray-200">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-gray-50 border-b border-gray-200">
                        <tr>
                            <th class="px-6 py-3 text-xs font-bold text-gray-500 uppercase">Date</th>
                            <th class="px-6 py-3 text-xs font-bold text-gray-500 uppercase">Position</th>
                            <th class="px-6 py-3 text-xs font-bold text-gray-500 uppercase">Dept</th>
                            <th class="px-6 py-3 text-xs font-bold text-gray-500 uppercase">Supervisor</th>
                            <th class="px-6 py-3 text-xs font-bold text-gray-500 uppercase text-center">Action</th>
                        </tr>
                    </thead>
                    <tbody id="pending-table-body" class="divide-y divide-gray-200">
                        <!-- Dito papasok ang data mula sa Firebase -->
                        <tr>
                            <td colspan="5" class="px-6 py-10 text-center text-gray-400 italic">Loading requests...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- SECTION: MANPOWER REQUEST FORM -->
        <section id="section-mrf" class="content-section">
            <div class="mrf-container shadow-lg">
                <div class="text-center mb-6">
                    <h1 class="text-xl font-bold uppercase">Manpower Request Form</h1>
                </div>

                <form id="mrfForm" class="text-[12px] space-y-4">
                    <!-- (Ito yung same form fields na ginawa natin kanina) -->
                    <div class="grid grid-cols-2 gap-4 border p-4 bg-gray-50">
                        <div>
                            <label class="block font-bold">Job Position:</label>
                            <input type="text" name="position" required class="w-full">
                        </div>
                        <div>
                            <label class="block font-bold">Department:</label>
                            <input type="text" name="department" required class="w-full">
                        </div>
                    </div>
                    
                    <div class="bg-blue-50 p-4 border border-blue-200 mt-4 rounded-md">
                        <label class="block font-bold text-blue-900 mb-2">Supervisor Signature:</label>
                        <canvas id="sig-supervisor"></canvas>
                        <button type="button" onclick="padSup.clear()" class="text-red-500 text-[10px] font-bold mt-1">Clear</button>
                    </div>

                    <button type="submit" class="w-full bg-blue-900 text-white font-bold py-3 hover:bg-black rounded">Submit MRF</button>
                </form>
            </div>
        </section>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore.js";

        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyCdhUss3U_1j6LJDSg_n52w0x3XwRHNiPA",
            authDomain: "imerch-mrf-system.firebaseapp.com",
            projectId: "imerch-mrf-system",
            storageBucket: "imerch-mrf-system.firebasestorage.app",
            messagingSenderId: "184736719495",
            appId: "1:184736719495:web:52a3b0336a140de1ac8e22"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // UI NAVIGATION LOGIC
        window.showSection = function(sectionId) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('nav a').forEach(a => a.classList.remove('active-link'));
            
            document.getElementById('section-' + sectionId).classList.add('active');
            document.getElementById('nav-' + sectionId).classList.add('active-link');
        };

        // REAL-TIME DASHBOARD FETCH
        const q = query(collection(db, "mrf_requests"), where("status", "==", "PENDING_DEPT_HEAD"));
        onSnapshot(q, (snapshot) => {
            const tableBody = document.getElementById('pending-table-body');
            tableBody.innerHTML = '';
            
            if (snapshot.empty) {
                tableBody.innerHTML = '<tr><td colspan="5" class="px-6 py-10 text-center text-gray-400 italic">No pending requests found.</td></tr>';
                return;
            }

            snapshot.forEach((doc) => {
                const item = doc.data();
                const row = `
                    <tr class="hover:bg-gray-50 transition-colors">
                        <td class="px-6 py-4 text-sm">${item.submittedAt?.toDate().toLocaleDateString() || 'N/A'}</td>
                        <td class="px-6 py-4 text-sm font-medium text-gray-900">${item.position}</td>
                        <td class="px-6 py-4 text-sm text-gray-600">${item.department}</td>
                        <td class="px-6 py-4 text-sm text-gray-600">${item.supervisor_email}</td>
                        <td class="px-6 py-4 text-center">
                            <button class="bg-blue-600 text-white px-3 py-1 rounded text-xs hover:bg-blue-800">View/Approve</button>
                        </td>
                    </tr>
                `;
                tableBody.innerHTML += row;
            });
        });

        // FORM SUBMISSION
        const canvas = document.getElementById('sig-supervisor');
        window.padSup = new SignaturePad(canvas);

        document.getElementById('mrfForm').onsubmit = async (e) => {
            e.preventDefault();
            if(padSup.isEmpty()) return alert("Pirma muna!");

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            data.signature_supervisor = padSup.toDataURL();
            data.status = "PENDING_DEPT_HEAD";
            data.submittedAt = new Date();

            try {
                await addDoc(collection(db, "mrf_requests"), data);
                alert("MRF Submitted! Redirecting to Dashboard...");
                showSection('dashboard');
                e.target.reset();
                padSup.clear();
            } catch (err) {
                alert("Error: " + err.message);
            }
        };
    </script>
</body>
</html>
